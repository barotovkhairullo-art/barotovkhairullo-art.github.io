<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Подготовка файла — Khairullo Barotov</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:#eef8ff;background:#07111f;font:15px system-ui,sans-serif}.card{width:min(700px,100%);padding:34px;border:1px solid #27445c;border-radius:22px;background:#0b192a;text-align:center}h1{margin:0 0 12px;font-size:28px}p{color:#96aaba}.bar{height:8px;margin:25px 0;overflow:hidden;border-radius:9px;background:#162d40}.bar span{display:block;width:0;height:100%;background:#57e6d2;transition:width .2s}.button{display:none;margin:auto;padding:13px 20px;border:0;border-radius:12px;color:#041116;background:#57e6d2;font-weight:800;cursor:pointer}iframe{display:none;width:100%;height:75vh;margin-top:24px;border:0;border-radius:12px;background:#fff}.error{color:#ff9b85}
  </style>
</head>
<body>
  <main class="card">
    <h1 id="title">Подготовка файла…</h1>
    <p id="status">Загрузка оригинала из портфолио</p>
    <div class="bar"><span id="progress"></span></div>
    <button class="button" id="download" type="button">Скачать файл</button>
    <iframe id="viewer" title="Просмотр CV"></iframe>
  </main>
  <script src="downloads.js"></script>
</body>
</html>
