name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare portfolio artifact
        run: |
          mkdir -p site
          wget \
            --mirror \
            --page-requisites \
            --convert-links \
            --adjust-extension \
            --no-parent \
            --directory-prefix=/tmp/portfolio \
            https://khairullo-cybersecurity.barotov-khairullo.chatgpt.site/
          cp -a /tmp/portfolio/khairullo-cybersecurity.barotov-khairullo.chatgpt.site/. site/
          test -f site/index.html
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
